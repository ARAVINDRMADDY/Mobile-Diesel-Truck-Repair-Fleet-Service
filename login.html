<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TruckFix Mobile Diesel Truck Repair</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'accent': '#2563EB', /* Royal Blue */
            'highlight': '#2563EB', /* Royal Blue */
            'brand-dark': '#0F172A', /* Dark Navy */
            'brand-light': '#FFFFFF', /* White */
            'brand-muted': '#64748B' /* Cool Gray */
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }
    
    [dir="rtl"] { direction: rtl; }

    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body class="font-sans antialiased bg-brand-light dark:bg-brand-dark h-screen overflow-hidden flex flex-col transition-colors duration-300">

  <nav class="bg-brand-light dark:bg-brand-dark fixed w-full top-0 z-50 border-b border-gray-200 dark:border-white/10 transition-colors duration-300">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-[90px]">

        <div class="flex-shrink-0">
          <a href="index.html" class="flex items-center gap-3">
            <div class="flex flex-col">
              <span class="text-2xl font-semibold tracking-tight text-brand-dark dark:text-brand-light uppercase">Truck<span class="text-accent">Fix<span class="text-highlight">.</span></span></span>
            </div>
          </a>
        </div>

        <div class="flex items-center gap-4">
          <button id="theme-toggle" class="relative w-[72px] h-[34px] flex items-center bg-gray-200 dark:bg-[#1E293B] rounded-full p-1 transition-colors duration-300 focus:outline-none border border-gray-300 dark:border-gray-700 overflow-hidden" title="Toggle Theme">
            <span class="text-[9px] font-medium text-gray-500 absolute end-2.5 dark:opacity-0 transition-opacity duration-300 tracking-wider">LIGHT</span>
            <span class="text-[9px] font-medium text-accent absolute start-2.5 opacity-0 dark:opacity-100 transition-opacity duration-300 tracking-wider">DARK</span>
            
            <div class="w-[24px] h-[24px] bg-white dark:bg-brand-dark border border-gray-200 dark:border-gray-600 rounded-full shadow-sm transform transition-transform duration-300 flex items-center justify-center rtl:dark:-translate-x-[38px] ltr:dark:translate-x-[38px] dark:translate-x-[38px] z-10">
              <i class="fas fa-sun text-[11px] text-highlight dark:hidden block"></i>
              <i class="fas fa-moon text-[11px] text-accent hidden dark:block"></i>
            </div>
          </button>
          
          <button id="rtl-toggle" class="text-xs font-medium text-gray-400 hover:text-accent transition-colors duration-300 ms-2" title="Toggle RTL">
            RTL
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="absolute top-20 start-10 w-72 h-72 bg-accent/10 rounded-full blur-3xl animate-pulse pointer-events-none"></div>
  <div class="absolute bottom-20 end-10 w-96 h-96 bg-brand-muted/20 dark:bg-white/5 rounded-full blur-3xl animate-pulse pointer-events-none" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 overflow-y-auto flex items-center justify-center p-4 pt-[90px]">
    
    <div class="w-full max-w-[320px] bg-white dark:bg-[#1E293B] shadow-2xl p-6 border border-gray-200 dark:border-gray-800 relative z-10 animate-fade-in group rounded-2xl">
        
        <div class="absolute top-0 start-0 w-full h-1 bg-gradient-to-r from-accent to-transparent rounded-t-2xl"></div>

        <div class="text-center mb-6">
          <h2 class="text-2xl font-semibold text-brand-dark dark:text-brand-light uppercase tracking-tight mb-2">Welcome Back.</h2>
          <p class="text-[10px] uppercase tracking-[0.2em] font-medium text-brand-muted">Sign in to access your user dashboard</p>
        </div>

        <form class="flex flex-col gap-4" onsubmit="handleLogin(event)">

          <div>
              <label class="block text-[10px] font-medium uppercase tracking-widest text-brand-dark dark:text-brand-light mb-2">
                Email Address
              </label>
              <input 
                type="email" 
                required
                placeholder="YOUR.EMAIL@EXAMPLE.COM"
                class="w-full px-3 py-3 bg-transparent border border-gray-300 dark:border-gray-700 text-brand-dark dark:text-brand-light text-xs uppercase tracking-widest focus:outline-none focus:border-accent dark:focus:border-accent focus:ring-1 focus:ring-accent rounded-md transition-all"
              />
          </div>

          <div>
              <label class="block text-[10px] font-medium uppercase tracking-widest text-brand-dark dark:text-brand-light mb-2">
                Password
              </label>
              <div class="relative">
                <input 
                    type="password" 
                    id="password"
                    required
                    placeholder="ENTER YOUR PASSWORD"
                    class="w-full px-3 py-3 bg-transparent border border-gray-300 dark:border-gray-700 text-brand-dark dark:text-brand-light text-xs uppercase tracking-widest focus:outline-none focus:border-accent dark:focus:border-accent focus:ring-1 focus:ring-accent rounded-md transition-all"
                />
                <button 
                    type="button" 
                    onclick="togglePassword()"
                    class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-accent transition-colors"
                >
                    <i class="fas fa-eye text-sm" id="toggleIcon"></i>
                </button>
              </div>
          </div>

          <div class="flex items-center justify-between text-[10px] sm:text-xs pt-1">
              <label class="flex items-center cursor-pointer group-checkbox">
                <input type="checkbox" class="w-3 h-3 sm:w-4 sm:h-4 rounded border-gray-300 text-accent focus:ring-accent bg-transparent">
                <span class="ms-2 text-brand-muted font-medium uppercase tracking-widest">Remember me</span>
              </label>
              <span class="text-accent font-medium uppercase tracking-widest cursor-pointer hover:text-brand-dark dark:hover:text-brand-light transition-colors">
                Forgot password?
              </span>
          </div>

          <button 
              type="submit"
              class="w-full py-3 mt-4 bg-accent text-white hover:bg-blue-700 font-semibold uppercase tracking-widest text-xs transition-all duration-300 flex items-center justify-center gap-2 rounded-full shadow-lg shadow-accent/20"
          >
              <span>Sign In</span>
              <i class="fas fa-arrow-right text-[10px] rtl:rotate-180"></i>
          </button>

          <div class="relative my-6">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
              </div>
              <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-medium">
                <span class="px-3 bg-white dark:bg-[#1E293B] text-brand-muted">Or Continue With</span>
              </div>
          </div>

          <div class="flex flex-col gap-2.5">
              <button 
                type="button"
                class="flex items-center justify-center w-full px-3 py-2.5 border border-gray-300 dark:border-gray-700 hover:border-accent dark:hover:border-accent transition-colors bg-transparent rounded-full gap-2"
              >
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-[10px] font-medium uppercase tracking-widest text-brand-dark dark:text-brand-light">Google</span>
              </button>

              <button 
                type="button"
                class="flex items-center justify-center w-full px-3 py-2.5 border border-gray-300 dark:border-gray-700 hover:border-accent dark:hover:border-accent transition-colors bg-transparent rounded-full gap-2"
              >
                <i class="fab fa-apple text-base text-brand-dark dark:text-brand-light"></i>
                <span class="text-[10px] font-medium uppercase tracking-widest text-brand-dark dark:text-brand-light">Apple</span>
              </button>

              <button 
                type="button"
                class="flex items-center justify-center w-full px-3 py-2.5 border border-gray-300 dark:border-gray-700 hover:border-accent dark:hover:border-accent transition-colors bg-transparent rounded-full gap-2"
              >
                <i class="fab fa-facebook text-blue-600 text-base"></i>
                <span class="text-[10px] font-medium uppercase tracking-widest text-brand-dark dark:text-brand-light">Facebook</span>
              </button>
          </div>

        </form>

        <div class="mt-6 text-center text-[10px] sm:text-xs font-medium uppercase tracking-widest text-brand-muted">
          No Account? 
          <a href="register.html" class="text-brand-dark dark:text-brand-light hover:text-accent transition-colors ms-1 border-b border-accent pb-0.5 font-semibold">
              Sign Up
          </a>
        </div>

    </div>
  </div>

  <script>
    // Toggle Password Visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Handle Login Submit (Simulation)
    function handleLogin(event) {
      event.preventDefault();

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin';
      span.innerText = 'AUTHENTICATING...';
      button.disabled = true;
      button.classList.add('opacity-50', 'cursor-not-allowed');

      // Simulate API call, then redirect to the new Client Dashboard
      setTimeout(() => {
        window.location.href = 'client-dashboard.html';
      }, 1500);
    }

    // Theme Toggle Function
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Function
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');

  </script>

</body>
</html>
